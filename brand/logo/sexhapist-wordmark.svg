<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" role="img" aria-label="Sexhapist">
  <title>Sexhapist — horizontal wordmark</title>
  <desc>Confidant Mark paired with the wordmark set in Fraunces 500 with an italic x.</desc>
  <style>
    .wordmark { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-size: 44px; font-weight: 500; fill: #1d1d1f; letter-spacing: -0.5px; }
    .wordmark .italic { font-style: italic; font-weight: 400; }
  </style>
  <g transform="translate(10 18) scale(0.54)">
    <path d="M45.75 36.36 A24 24 0 1 0 45.75 63.64 A18 18 0 1 1 45.75 36.36 Z" fill="#1d1d1f"/>
    <path d="M54.25 36.36 A24 24 0 1 1 54.25 63.64 A18 18 0 1 0 54.25 36.36 Z" fill="#1d1d1f"/>
  </g>
  <text class="wordmark" x="78" y="60">Se<tspan class="italic">x</tspan>hapist</text>
</svg>
