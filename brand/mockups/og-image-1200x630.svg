<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sexhapist — Be Bold. Be Honest. Be Happy.">
  <title>Sexhapist — social share card</title>
  <style>
    .display { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; fill: #1d1d1f; }
    .body    { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .ital    { font-style: italic; font-weight: 400; }
  </style>

  <rect width="1200" height="630" fill="#f7f3ee"/>

  <!-- mark -->
  <g transform="translate(140 165) scale(3)">
    <path d="M45.75 36.36 A24 24 0 1 0 45.75 63.64 A18 18 0 1 1 45.75 36.36 Z" fill="#0066cc"/>
    <path d="M54.25 36.36 A24 24 0 1 1 54.25 63.64 A18 18 0 1 0 54.25 36.36 Z" fill="#b85a6e"/>
  </g>

  <!-- hairline divider -->
  <line x1="555" y1="200" x2="555" y2="430" stroke="#d2d2d7" stroke-width="1"/>

  <!-- wordmark -->
  <text class="display" x="615" y="305" font-size="104" font-weight="500" letter-spacing="-1.5">Se<tspan class="ital">x</tspan>hapist</text>

  <!-- tagline -->
  <text class="display ital" x="615" y="365" font-size="28" fill="#424245">be bold. be honest. be happy.</text>

  <!-- subhead -->
  <text class="body" x="615" y="412" font-size="18" fill="#6e6e73" font-weight="400">Built for the conversations most men never have.</text>

  <!-- corner mark -->
  <text class="body" x="80" y="80" font-size="14" fill="#6e6e73" font-weight="500" letter-spacing="2.5">SEXHAPIST</text>
  <text class="body" x="1120" y="80" font-size="14" fill="#6e6e73" font-weight="500" letter-spacing="2.5" text-anchor="end">PRIVATE · CANDID</text>
</svg>
